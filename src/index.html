# FrontEnd/index.html

```html
<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ticket API Admin Panel</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: Arial, sans-serif;
			background: #0f172a;
			color: white;
			padding: 20px;
		}

		h1 {
			margin-bottom: 30px;
			font-size: 36px;
			color: #38bdf8;
		}

		h2 {
			margin-bottom: 15px;
			color: #f8fafc;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
			gap: 20px;
		}

		.card {
			background: #1e293b;
			border-radius: 16px;
			padding: 20px;
			border: 1px solid #334155;
			box-shadow: 0 5px 20px rgba(0,0,0,0.3);
		}

		.row {
			display: flex;
			gap: 10px;
			margin-bottom: 10px;
			flex-wrap: wrap;
		}

		input, select, textarea {
			width: 100%;
			padding: 12px;
			border-radius: 10px;
			border: 1px solid #475569;
			background: #0f172a;
			color: white;
			margin-bottom: 10px;
		}

		button {
			padding: 10px 16px;
			border: none;
			border-radius: 10px;
			background: #0ea5e9;
			color: white;
			cursor: pointer;
			font-weight: bold;
			transition: 0.2s;
		}

		button:hover {
			background: #0284c7;
			transform: translateY(-2px);
		}

		.danger {
			background: #ef4444;
		}

		.danger:hover {
			background: #dc2626;
		}

		.success {
			background: #22c55e;
		}

		.success:hover {
			background: #16a34a;
		}

		pre {
			background: black;
			color: #22c55e;
			padding: 20px;
			border-radius: 16px;
			overflow: auto;
			min-height: 400px;
			max-height: 700px;
			margin-top: 20px;
			border: 1px solid #334155;
		}

		.full {
			grid-column: 1 / -1;
		}

		.small-btn {
			padding: 8px 10px;
			font-size: 12px;
		}
	</style>
</head>
<body>

<h1>🎟 Ticket API Admin Panel</h1>

<div class="grid">

	<!-- USERS -->
	<div class="card">
		<h2>👤 Users CRUD</h2>

		<input id="uFirst" placeholder="First name">
		<input id="uLast" placeholder="Last name">
		<input id="uEmail" placeholder="Email">
		<input id="uPass" placeholder="Password">

		<div class="row">
			<button class="success" onclick="createUser()">CREATE</button>
			<button onclick="getUsers()">GET ALL</button>
		</div>

		<input id="uId" placeholder="User ID">

		<div class="row">
			<button onclick="getUser()">GET ONE</button>
			<button onclick="updateUser()">UPDATE</button>
			<button class="danger" onclick="deleteUser()">DELETE</button>
		</div>
	</div>


	<!-- TICKETS -->
	<div class="card">
		<h2>🎫 Tickets CRUD</h2>

		<input id="tTitle" placeholder="Title">
		<input id="tPoster" placeholder="Poster URL">
		<input id="tDate" type="datetime-local">
		<input id="tPrice" type="number" placeholder="Price">
		<input id="tStock" type="number" placeholder="Stock">

		<div class="row">
			<button class="success" onclick="createTicket()">CREATE</button>
			<button onclick="getTickets()">GET ALL</button>
		</div>

		<input id="tId" placeholder="Ticket ID">

		<div class="row">
			<button onclick="getTicket()">GET ONE</button>
			<button onclick="updateTicket()">UPDATE</button>
			<button class="danger" onclick="deleteTicket()">DELETE</button>
		</div>
	</div>


	<!-- SEARCH SORT PAGINATION -->
	<div class="card">
		<h2>🔍 Search / Sort / Pagination</h2>

		<input id="search" placeholder="Search title">

		<button onclick="searchTickets()">SEARCH</button>

		<hr style="margin:20px 0; border-color:#334155;">

		<div class="row">
			<button class="small-btn" onclick="sortPriceAsc()">PRICE ASC</button>
			<button class="small-btn" onclick="sortPriceDesc()">PRICE DESC</button>
			<button class="small-btn" onclick="sortDateAsc()">DATE ASC</button>
			<button class="small-btn" onclick="sortDateDesc()">DATE DESC</button>
			<button class="small-btn" onclick="sortStock()">STOCK DESC</button>
		</div>

		<hr style="margin:20px 0; border-color:#334155;">

		<input id="page" type="number" placeholder="Page">
		<input id="limit" type="number" placeholder="Limit">

		<button onclick="pagination()">PAGINATION</button>
	</div>


	<!-- PROMOTIONS -->
	<div class="card">
		<h2>🏷 Promotions CRUD</h2>

		<input id="pTicketId" placeholder="Ticket ID">
		<input id="pTitle" placeholder="Promotion title">
		<input id="pDiscount" placeholder="Discount">
		<input id="pDate" type="date">

		<div class="row">
			<button class="success" onclick="createPromo()">CREATE</button>
			<button onclick="getPromos()">GET ALL</button>
		</div>

		<input id="pId" placeholder="Promotion ID">

		<div class="row">
			<button onclick="updatePromo()">UPDATE</button>
			<button class="danger" onclick="deletePromo()">DELETE</button>
		</div>
	</div>


	<!-- CART -->
	<div class="card">
		<h2>🛒 Cart / Favorites CRUD</h2>

		<input id="cUser" placeholder="User ID">
		<input id="cTicket" placeholder="Ticket ID">

		<select id="cType">
			<option value="cart">cart</option>
			<option value="favorite">favorite</option>
		</select>

		<input id="cQuantity" placeholder="Quantity">

		<div class="row">
			<button class="success" onclick="createCart()">CREATE</button>
			<button onclick="getCart()">GET CART</button>
		</div>

		<input id="cId" placeholder="Cart Item ID">

		<div class="row">
			<button onclick="updateCart()">UPDATE</button>
			<button class="danger" onclick="deleteCart()">DELETE</button>
		</div>

		<hr style="margin:20px 0; border-color:#334155;">

		<div class="row">
			<button onclick="cartCount()">CART COUNT</button>
			<button onclick="favoriteCount()">FAVORITES COUNT</button>
		</div>
	</div>


	<!-- ORDERS -->
	<div class="card">
		<h2>💳 Orders CR</h2>

		<input id="oUser" placeholder="User ID">
		<input id="oAmount" placeholder="Total amount">

		<div class="row">
			<button class="success" onclick="createOrder()">CREATE ORDER</button>
			<button onclick="getOrders()">GET ORDERS</button>
		</div>
	</div>


	<!-- REVIEWS -->
	<div class="card">
		<h2>⭐ Reviews CR</h2>

		<input id="rUser" placeholder="User ID">
		<input id="rOrder" placeholder="Order ID">

		<textarea id="rComment" placeholder="Comment"></textarea>

		<div class="row">
			<button class="success" onclick="createReview()">CREATE REVIEW</button>
			<button onclick="getReviews()">GET REVIEWS</button>
		</div>
	</div>


	<!-- HISTORY -->
	<div class="card">
		<h2>📜 History CR</h2>

		<input id="hOrder" placeholder="Order ID">

		<div class="row">
			<button class="success" onclick="createHistory()">CREATE HISTORY</button>
			<button onclick="getHistory()">GET HISTORY</button>
		</div>
	</div>


	<!-- DOCS -->
	<div class="card">
		<h2>📄 DOCX Documents CR</h2>

		<input id="dTitle" placeholder="Document title">
		<textarea id="dText" placeholder="Document text"></textarea>

		<div class="row">
			<button class="success" onclick="createDoc()">CREATE DOC</button>
			<button onclick="getDocs()">GET DOCS</button>
		</div>
	</div>


	<!-- OUTPUT -->
	<div class="card full">
		<h2>🖥 API Response</h2>

		<pre id="output">READY...</pre>
	</div>

</div>

<script>

	const output = document.getElementById('output');

	function show(data){
		output.textContent = JSON.stringify(data, null, 2);
	}

	async function request(url, method='GET', body=null){

		try{

			const options = {
				method,
				headers:{
					'Content-Type':'application/json'
				}
			};

			if(body){
				options.body = JSON.stringify(body);
			}

			const res = await fetch(url, options);

			const text = await res.text();

			try{
				show(JSON.parse(text));
			}
			catch{
				output.textContent = text;
			}

		}catch(err){
			output.textContent = err.message;
		}
	}


	// USERS

	function createUser(){
		request('/api/users', 'POST', {
			firstName: uFirst.value,
			lastName: uLast.value,
			email: uEmail.value,
			password: uPass.value
		});
	}

	function getUsers(){
		request('/api/users');
	}

	function getUser(){
		request(`/api/users/${uId.value}`);
	}

	function updateUser(){
		request(`/api/users/${uId.value}`, 'PUT', {
			firstName: uFirst.value,
			lastName: uLast.value,
			email: uEmail.value,
			password: uPass.value
		});
	}

	function deleteUser(){
		request(`/api/users/${uId.value}`, 'DELETE');
	}


	// TICKETS

	function createTicket(){
		request('/api/tickets', 'POST', {
			title: tTitle.value,
			posterUrl: tPoster.value,
			dateTime: tDate.value,
			basePrice: Number(tPrice.value),
			stock: Number(tStock.value)
		});
	}

	function getTickets(){
		request('/api/tickets');
	}

	function getTicket(){
		request(`/api/tickets/${tId.value}`);
	}

	function updateTicket(){
		request(`/api/tickets/${tId.value}`, 'PUT', {
			title: tTitle.value,
			posterUrl: tPoster.value,
			dateTime: tDate.value,
			basePrice: Number(tPrice.value),
			stock: Number(tStock.value)
		});
	}

	function deleteTicket(){
		request(`/api/tickets/${tId.value}`, 'DELETE');
	}


	// SEARCH

	function searchTickets(){
		request(`/api/tickets/search?q=${search.value}`);
	}


	// SORT

	function sortPriceAsc(){
		request('/api/tickets/sort/price-asc');
	}

	function sortPriceDesc(){
		request('/api/tickets/sort/price-desc');
	}

	function sortDateAsc(){
		request('/api/tickets/sort/date-asc');
	}

	function sortDateDesc(){
		request('/api/tickets/sort/date-desc');
	}

	function sortStock(){
		request('/api/tickets/sort/stock-desc');
	}


	// PAGINATION

	function pagination(){
		request(`/api/tickets/page?page=${page.value}&limit=${limit.value}`);
	}


	// PROMOTIONS

	function createPromo(){
		request('/api/promotions', 'POST', {
			ticketId: Number(pTicketId.value),
			title: pTitle.value,
			discount: Number(pDiscount.value),
			validUntil: pDate.value
		});
	}

	function getPromos(){
		request('/api/promotions');
	}

	function updatePromo(){
		request(`/api/promotions/${pId.value}`, 'PUT', {
			title: pTitle.value,
			discount: Number(pDiscount.value)
		});
	}

	function deletePromo(){
		request(`/api/promotions/${pId.value}`, 'DELETE');
	}


	// CART

	function createCart(){
		request('/api/cart', 'POST', {
			userId: Number(cUser.value),
			ticketId: Number(cTicket.value),
			type: cType.value,
			quantity: Number(cQuantity.value)
		});
	}

	function getCart(){
		request(`/api/cart/${cUser.value}`);
	}

	function updateCart(){
		request(`/api/cart/${cId.value}`, 'PUT', {
			quantity: Number(cQuantity.value)
		});
	}

	function deleteCart(){
		request(`/api/cart/${cId.value}`, 'DELETE');
	}

	function cartCount(){
		request(`/api/cart/count/${cUser.value}`);
	}

	function favoriteCount(){
		request(`/api/favorites/count/${cUser.value}`);
	}


	// ORDERS

	function createOrder(){
		request('/api/orders', 'POST', {
			userId: Number(oUser.value),
			totalAmount: Number(oAmount.value)
		});
	}

	function getOrders(){
		request('/api/orders');
	}


	// REVIEWS

	function createReview(){
		request('/api/reviews', 'POST', {
			userId: Number(rUser.value),
			orderId: Number(rOrder.value),
			comment: rComment.value
		});
	}

	function getReviews(){
		request('/api/reviews');
	}


	// HISTORY

	function createHistory(){
		request('/api/history', 'POST', {
			orderId: Number(hOrder.value)
		});
	}

	function getHistory(){
		request('/api/history');
	}


	// DOCS

	function createDoc(){
		request('/api/documents', 'POST', {
			title: dTitle.value,
			text: dText.value
		});
	}

	function getDocs(){
		request('/api/documents');
	}

</script>

</body>
</html>
